<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 22px; font-weight: 800; color: #4f6ef7; }

    .back-btn {
      padding: 8px 18px;
      background: transparent;
      color: #4f6ef7;
      border: 1.5px solid #4f6ef7;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .back-btn:hover { background: #4f6ef7; color: #fff; }

    .page-header {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: #fff;
      padding: 40px;
    }
    .page-header h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .page-header p { opacity: 0.85; font-size: 15px; }

    .content {
      max-width: 640px;
      margin: 32px auto;
      padding: 0 20px 60px;
    }

    .section-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }

    .section-card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: #7c3aed; }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .toggle-row:last-child { margin-bottom: 0; }

    .toggle-info { font-size: 14px; color: #333; }
    .toggle-info small { display: block; font-size: 12px; color: #aaa; margin-top: 2px; }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #ddd;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle input:checked + .slider { background: #7c3aed; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    .save-btn {
      width: 100%;
      padding: 13px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #6d28d9; }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <span class="logo">TEST1</span>
    <button class="back-btn" onclick="location.href='index.html'">← 메인으로</button>
  </header>

  <div class="page-header">
    <h1>⚙️ 설정</h1>
    <p>계정 정보와 서비스 환경을 원하는 대로 설정하세요.</p>
  </div>

  <div class="content">
    <div class="section-card">
      <h2>프로필 정보</h2>
      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" value="홍길동" />
      </div>
      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" value="example@email.com" />
      </div>
    </div>

    <div class="section-card">
      <h2>비밀번호 변경</h2>
      <div class="field">
        <label for="currentPw">현재 비밀번호</label>
        <input type="password" id="currentPw" placeholder="현재 비밀번호 입력" />
      </div>
      <div class="field">
        <label for="newPw">새 비밀번호</label>
        <input type="password" id="newPw" placeholder="8자 이상" />
      </div>
      <div class="field">
        <label for="confirmPw">새 비밀번호 확인</label>
        <input type="password" id="confirmPw" placeholder="새 비밀번호 재입력" />
      </div>
    </div>

    <div class="section-card">
      <h2>알림 설정</h2>
      <div class="toggle-row">
        <div class="toggle-info">
          이메일 알림
          <small>주요 업데이트를 이메일로 받습니다.</small>
        </div>
        <label class="toggle">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          마케팅 수신
          <small>이벤트 및 프로모션 정보를 받습니다.</small>
        </div>
        <label class="toggle">
          <input type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <button class="save-btn" onclick="save()">저장하기</button>
  </div>

  <div class="toast" id="toast">설정이 저장되었습니다.</div>

  <script>
    function save() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
