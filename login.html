<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #4f6ef7;
    }

    input.error {
      border-color: #e53e3e;
    }

    .error-msg {
      font-size: 12px;
      color: #e53e3e;
      margin-top: 4px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      font-size: 13px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
    }

    .remember input[type="checkbox"] {
      width: auto;
      cursor: pointer;
    }

    .forgot-link {
      color: #4f6ef7;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #3a57e8;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0;
      color: #bbb;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .social-btn {
      width: 100%;
      padding: 11px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    .social-btn:hover {
      background: #f7f8fa;
    }

    .social-btn img {
      width: 18px;
      height: 18px;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .signup-link a {
      color: #4f6ef7;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .alert {
      display: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .alert.error {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
      display: block;
    }

    .alert.success {
      background: #e6ffed;
      border: 1px solid #68d391;
      color: #276749;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>로그인</h1>
    <p class="subtitle">계정에 로그인하세요</p>

    <div class="alert" id="alertMsg"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="example@email.com" />
        <span class="error-msg" id="emailErr">유효한 이메일을 입력하세요.</span>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력" />
        <span class="error-msg" id="passwordErr">비밀번호를 입력하세요.</span>
      </div>

      <div class="options-row">
        <label class="remember">
          <input type="checkbox" id="remember" /> 로그인 상태 유지
        </label>
        <a href="#" class="forgot-link">비밀번호 찾기</a>
      </div>

      <button type="submit">로그인</button>
    </form>

    <div class="divider">또는</div>

    <button class="social-btn" onclick="alert('구글 로그인은 준비 중입니다.')">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3-11.3-7.4l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.4 4.3-4.4 5.6l6.2 5.2C36.9 39 44 34 44 24c0-1.2-.1-2.3-.4-3.5z"/>
      </svg>
      Google로 로그인
    </button>

    <button class="social-btn" onclick="alert('카카오 로그인은 준비 중입니다.')">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#3A1D1D" d="M12 3C6.5 3 2 6.6 2 11c0 2.8 1.8 5.3 4.5 6.8l-1.1 4.1 4.7-3.1c.6.1 1.3.2 1.9.2 5.5 0 10-3.6 10-8S17.5 3 12 3z"/>
      </svg>
      카카오로 로그인
    </button>

    <p class="signup-link">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertMsg = document.getElementById('alertMsg');

    function showError(inputId, errId, show) {
      const input = document.getElementById(inputId);
      const err = document.getElementById(errId);
      if (show) {
        input.classList.add('error');
        err.classList.add('visible');
      } else {
        input.classList.remove('error');
        err.classList.remove('visible');
      }
    }

    function showAlert(message, type) {
      alertMsg.textContent = message;
      alertMsg.className = 'alert ' + type;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      alertMsg.className = 'alert';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      showError('email', 'emailErr', !emailValid);
      if (!emailValid) valid = false;

      showError('password', 'passwordErr', !password);
      if (!password) valid = false;

      if (valid) {
        showAlert('로그인에 성공했습니다! 잠시 후 이동합니다...', 'success');
        form.reset();
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      }
    });
  </script>
</body>
</html>
