<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 22px; font-weight: 800; color: #4f6ef7; }

    .back-btn {
      padding: 8px 18px;
      background: transparent;
      color: #4f6ef7;
      border: 1.5px solid #4f6ef7;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .back-btn:hover { background: #4f6ef7; color: #fff; }

    .page-header {
      background: linear-gradient(135deg, #4f6ef7, #a78bfa);
      color: #fff;
      padding: 40px;
    }
    .page-header h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .page-header p { opacity: 0.85; font-size: 15px; }

    .content {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .metric {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }
    .metric .title { font-size: 13px; color: #888; margin-bottom: 10px; }
    .metric .value { font-size: 30px; font-weight: 800; color: #4f6ef7; }
    .metric .change { font-size: 12px; color: #38a169; margin-top: 6px; }

    .chart-box {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }
    .chart-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 20px; }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 140px;
    }

    .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, #a78bfa, #4f6ef7);
      transition: opacity 0.2s;
    }
    .bar:hover { opacity: 0.8; }

    .bar-label { font-size: 11px; color: #aaa; }
  </style>
</head>
<body>
  <header>
    <span class="logo">TEST1</span>
    <button class="back-btn" onclick="location.href='index.html'">← 메인으로</button>
  </header>

  <div class="page-header">
    <h1>📊 대시보드</h1>
    <p>주요 지표와 활동 현황을 한눈에 확인하세요.</p>
  </div>

  <div class="content">
    <div class="grid">
      <div class="metric">
        <div class="title">전체 사용자</div>
        <div class="value">128</div>
        <div class="change">▲ 12% 지난주 대비</div>
      </div>
      <div class="metric">
        <div class="title">오늘 방문자</div>
        <div class="value">34</div>
        <div class="change">▲ 5% 어제 대비</div>
      </div>
      <div class="metric">
        <div class="title">신규 가입</div>
        <div class="value">8</div>
        <div class="change">▲ 3% 지난주 대비</div>
      </div>
      <div class="metric">
        <div class="title">서비스 가동률</div>
        <div class="value">97%</div>
        <div class="change" style="color:#888;">정상 운영 중</div>
      </div>
    </div>

    <div class="chart-box">
      <h3>주간 방문자 현황</h3>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </div>

  <script>
    const data = [
      { label: '월', value: 20 },
      { label: '화', value: 35 },
      { label: '수', value: 28 },
      { label: '목', value: 42 },
      { label: '금', value: 34 },
      { label: '토', value: 15 },
      { label: '일', value: 10 },
    ];
    const max = Math.max(...data.map(d => d.value));
    const chart = document.getElementById('barChart');

    data.forEach(d => {
      const wrap = document.createElement('div');
      wrap.className = 'bar-wrap';

      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = '0px';
      bar.title = `${d.label}: ${d.value}명`;

      const label = document.createElement('div');
      label.className = 'bar-label';
      label.textContent = d.label;

      wrap.appendChild(bar);
      wrap.appendChild(label);
      chart.appendChild(wrap);

      setTimeout(() => {
        bar.style.transition = 'height 0.7s cubic-bezier(0.34,1.56,0.64,1)';
        bar.style.height = (d.value / max * 120) + 'px';
      }, 100);
    });
  </script>
</body>
</html>
