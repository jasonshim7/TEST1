<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메인 페이지</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    header {
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #4f6ef7;
    }

    .logout-btn {
      padding: 8px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #3a57e8;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 32px;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 16px;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">TEST1</span>
    <button class="logout-btn" onclick="window.location.href='login.html'">로그아웃</button>
  </header>

  <div class="hero">
    <h1>환영합니다!</h1>
    <p>로그인에 성공했습니다.</p>
  </div>
</body>
</html>
